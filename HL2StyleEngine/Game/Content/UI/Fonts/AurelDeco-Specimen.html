<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Aurel Deco Specimen</title>
  <style>
    @font-face {
      font-family: "Aurel Deco";
      src: url("AurelDeco-Regular.ttf") format("truetype");
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #101515;
      color: #e9dfc9;
      font-family: "Aurel Deco", sans-serif;
      display: grid;
      place-items: center;
    }

    main {
      width: min(920px, calc(100vw - 64px));
    }

    h1 {
      margin: 0 0 28px;
      font-size: 76px;
      font-weight: 400;
      letter-spacing: 0;
    }

    p {
      margin: 14px 0;
      font-size: 34px;
      line-height: 1.25;
    }

    .small {
      color: #9fbaa8;
      font-size: 23px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Aurel Deco</h1>
    <p>Inventory  Archive Key  Crank Handle</p>
    <p>Use  Examine  Combine  Split  Discard</p>
    <p>0123456789  E / X: Confirm</p>
    <p class="small">Original project font prototype. Tall, narrow, Deco UI lettering.</p>
  </main>
</body>
</html>
